naftiko: 1.0.0-alpha2
info:
  label: Google Workspace Domain Administration
  description: Unified workflow for managing Google Workspace domain resources including users, groups, and organizational
    units. Used by IT administrators and workspace domain managers.
  tags:
  - Google Workspace
  - Domain Administration
  - User Management
  - Group Management
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    GOOGLE_WORKSPACE_ACCESS_TOKEN: GOOGLE_WORKSPACE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: gws-admin
    baseUri: https://admin.googleapis.com
    description: Google Admin SDK Directory API for domain management.
    authentication:
      type: bearer
      token: '{{GOOGLE_WORKSPACE_ACCESS_TOKEN}}'
    resources:
    - name: users
      path: /admin/directory/v1/users
      description: User account management.
      operations:
      - name: list-users
        method: GET
        description: List users in the domain.
        inputParameters:
        - name: domain
          in: query
          type: string
          required: false
          description: Domain name.
        - name: customer
          in: query
          type: string
          required: false
          description: Customer ID.
        - name: maxResults
          in: query
          type: integer
          required: false
          description: Maximum results (1-500).
        - name: pageToken
          in: query
          type: string
          required: false
          description: Page token.
        - name: query
          in: query
          type: string
          required: false
          description: Search query.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-user
        method: POST
        description: Create a new user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            primaryEmail: '{{tools.primaryEmail}}'
            name:
              givenName: '{{tools.givenName}}'
              familyName: '{{tools.familyName}}'
            password: '{{tools.password}}'
    - name: user-details
      path: /admin/directory/v1/users/{userKey}
      description: Individual user management.
      operations:
      - name: get-user
        method: GET
        description: Get user details.
        inputParameters:
        - name: userKey
          in: path
          type: string
          required: true
          description: User email or ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-user
        method: PUT
        description: Update a user.
        inputParameters:
        - name: userKey
          in: path
          type: string
          required: true
          description: User email or ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name:
              givenName: '{{tools.givenName}}'
      - name: patch-user
        method: PATCH
        description: Patch a user.
        inputParameters:
        - name: userKey
          in: path
          type: string
          required: true
          description: User email or ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            suspended: '{{tools.suspended}}'
      - name: delete-user
        method: DELETE
        description: Delete a user.
        inputParameters:
        - name: userKey
          in: path
          type: string
          required: true
          description: User email or ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: user-admin
      path: /admin/directory/v1/users/{userKey}/makeAdmin
      description: User admin operations.
      operations:
      - name: make-user-admin
        method: POST
        description: Make a user an admin.
        inputParameters:
        - name: userKey
          in: path
          type: string
          required: true
          description: User email or ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            status: '{{tools.status}}'
    - name: user-undelete
      path: /admin/directory/v1/users/{userKey}/undelete
      description: User undelete.
      operations:
      - name: undelete-user
        method: POST
        description: Undelete a user.
        inputParameters:
        - name: userKey
          in: path
          type: string
          required: true
          description: User email or ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: user-signout
      path: /admin/directory/v1/users/{userKey}/signOut
      description: User sign out.
      operations:
      - name: sign-out-user
        method: POST
        description: Sign out a user from all sessions.
        inputParameters:
        - name: userKey
          in: path
          type: string
          required: true
          description: User email or ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: groups
      path: /admin/directory/v1/groups
      description: Group management.
      operations:
      - name: list-groups
        method: GET
        description: List groups in the domain.
        inputParameters:
        - name: domain
          in: query
          type: string
          required: false
          description: Domain name.
        - name: customer
          in: query
          type: string
          required: false
          description: Customer ID.
        - name: maxResults
          in: query
          type: integer
          required: false
          description: Maximum results.
        - name: pageToken
          in: query
          type: string
          required: false
          description: Page token.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-group
        method: POST
        description: Create a new group.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            email: '{{tools.email}}'
            name: '{{tools.name}}'
    - name: group-details
      path: /admin/directory/v1/groups/{groupKey}
      description: Individual group management.
      operations:
      - name: get-group
        method: GET
        description: Get group details.
        inputParameters:
        - name: groupKey
          in: path
          type: string
          required: true
          description: Group email or ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-group
        method: PUT
        description: Update a group.
        inputParameters:
        - name: groupKey
          in: path
          type: string
          required: true
          description: Group email or ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
      - name: delete-group
        method: DELETE
        description: Delete a group.
        inputParameters:
        - name: groupKey
          in: path
          type: string
          required: true
          description: Group email or ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: org-units
      path: /admin/directory/v1/customer/{customerId}/orgunits
      description: Organizational unit management.
      operations:
      - name: list-org-units
        method: GET
        description: List organizational units.
        inputParameters:
        - name: customerId
          in: path
          type: string
          required: true
          description: Customer ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-org-unit
        method: POST
        description: Create an organizational unit.
        inputParameters:
        - name: customerId
          in: path
          type: string
          required: true
          description: Customer ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            parentOrgUnitPath: '{{tools.parentOrgUnitPath}}'
  exposes:
  - type: rest
    port: 8080
    namespace: gws-domain-admin-api
    description: Unified REST API for Google Workspace domain administration.
    resources:
    - path: /v1/users
      name: users
      description: User account management.
      operations:
      - method: GET
        name: list-users
        description: List users in the domain.
        call: gws-admin.list-users
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-user
        description: Create a new user.
        call: gws-admin.create-user
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{id}
      name: user-details
      description: Individual user management.
      operations:
      - method: GET
        name: get-user
        description: Get user details.
        call: gws-admin.get-user
        with:
          userKey: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: update-user
        description: Update a user.
        call: gws-admin.update-user
        with:
          userKey: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-user
        description: Delete a user.
        call: gws-admin.delete-user
        with:
          userKey: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/groups
      name: groups
      description: Group management.
      operations:
      - method: GET
        name: list-groups
        description: List groups.
        call: gws-admin.list-groups
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-group
        description: Create a group.
        call: gws-admin.create-group
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/groups/{id}
      name: group-details
      description: Individual group management.
      operations:
      - method: GET
        name: get-group
        description: Get group details.
        call: gws-admin.get-group
        with:
          groupKey: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: update-group
        description: Update a group.
        call: gws-admin.update-group
        with:
          groupKey: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-group
        description: Delete a group.
        call: gws-admin.delete-group
        with:
          groupKey: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/org-units
      name: org-units
      description: Organizational unit management.
      operations:
      - method: GET
        name: list-org-units
        description: List organizational units.
        call: gws-admin.list-org-units
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-org-unit
        description: Create an organizational unit.
        call: gws-admin.create-org-unit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9080
    namespace: gws-domain-admin-mcp
    transport: http
    description: MCP server for AI-assisted Google Workspace domain administration.
    tools:
    - name: list-users
      description: List users in the Google Workspace domain.
      hints:
        readOnly: true
        openWorld: true
      call: gws-admin.list-users
      outputParameters:
      - type: object
        mapping: $.
    - name: create-user
      description: Create a new user in the domain.
      hints:
        readOnly: false
      call: gws-admin.create-user
      outputParameters:
      - type: object
        mapping: $.
    - name: get-user
      description: Get user details.
      hints:
        readOnly: true
      call: gws-admin.get-user
      with:
        userKey: tools.userKey
      outputParameters:
      - type: object
        mapping: $.
    - name: update-user
      description: Update a user.
      hints:
        readOnly: false
        idempotent: true
      call: gws-admin.update-user
      with:
        userKey: tools.userKey
      outputParameters:
      - type: object
        mapping: $.
    - name: patch-user
      description: Patch user properties.
      hints:
        readOnly: false
        idempotent: true
      call: gws-admin.patch-user
      with:
        userKey: tools.userKey
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-user
      description: Delete a user.
      hints:
        destructive: true
        idempotent: true
      call: gws-admin.delete-user
      with:
        userKey: tools.userKey
      outputParameters:
      - type: object
        mapping: $.
    - name: make-user-admin
      description: Make a user an admin.
      hints:
        readOnly: false
      call: gws-admin.make-user-admin
      with:
        userKey: tools.userKey
      outputParameters:
      - type: object
        mapping: $.
    - name: undelete-user
      description: Undelete a deleted user.
      hints:
        readOnly: false
      call: gws-admin.undelete-user
      with:
        userKey: tools.userKey
      outputParameters:
      - type: object
        mapping: $.
    - name: sign-out-user
      description: Sign out a user from all sessions.
      hints:
        readOnly: false
      call: gws-admin.sign-out-user
      with:
        userKey: tools.userKey
      outputParameters:
      - type: object
        mapping: $.
    - name: list-groups
      description: List groups in the domain.
      hints:
        readOnly: true
        openWorld: true
      call: gws-admin.list-groups
      outputParameters:
      - type: object
        mapping: $.
    - name: create-group
      description: Create a new group.
      hints:
        readOnly: false
      call: gws-admin.create-group
      outputParameters:
      - type: object
        mapping: $.
    - name: get-group
      description: Get group details.
      hints:
        readOnly: true
      call: gws-admin.get-group
      with:
        groupKey: tools.groupKey
      outputParameters:
      - type: object
        mapping: $.
    - name: update-group
      description: Update a group.
      hints:
        readOnly: false
        idempotent: true
      call: gws-admin.update-group
      with:
        groupKey: tools.groupKey
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-group
      description: Delete a group.
      hints:
        destructive: true
        idempotent: true
      call: gws-admin.delete-group
      with:
        groupKey: tools.groupKey
      outputParameters:
      - type: object
        mapping: $.
    - name: list-org-units
      description: List organizational units.
      hints:
        readOnly: true
      call: gws-admin.list-org-units
      outputParameters:
      - type: object
        mapping: $.
    - name: create-org-unit
      description: Create an organizational unit.
      hints:
        readOnly: false
      call: gws-admin.create-org-unit
      outputParameters:
      - type: object
        mapping: $.
