naftiko: "1.0.0-alpha1"

info:
  label: "Google Workspace Admin SDK Directory API"
  description: "Google Admin SDK Directory API for managing users, groups, and organizational units in a Google Workspace domain."
  tags:
    - Google Workspace
    - Admin SDK
    - Directory
    - User Management
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      GOOGLE_WORKSPACE_ACCESS_TOKEN: GOOGLE_WORKSPACE_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: gws-admin
      baseUri: https://admin.googleapis.com
      description: "Google Admin SDK Directory API for domain management."
      authentication:
        type: bearer
        token: "{{GOOGLE_WORKSPACE_ACCESS_TOKEN}}"
      resources:
        - name: users
          path: /admin/directory/v1/users
          description: "User account management."
          operations:
            - name: list-users
              method: GET
              description: "List users in the domain."
              inputParameters:
                - name: domain
                  in: query
                  type: string
                  required: false
                  description: "Domain name."
                - name: customer
                  in: query
                  type: string
                  required: false
                  description: "Customer ID."
                - name: maxResults
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results (1-500)."
                - name: pageToken
                  in: query
                  type: string
                  required: false
                  description: "Page token."
                - name: query
                  in: query
                  type: string
                  required: false
                  description: "Search query."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-user
              method: POST
              description: "Create a new user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  primaryEmail: "{{tools.primaryEmail}}"
                  name:
                    givenName: "{{tools.givenName}}"
                    familyName: "{{tools.familyName}}"
                  password: "{{tools.password}}"
        - name: user-details
          path: /admin/directory/v1/users/{userKey}
          description: "Individual user management."
          operations:
            - name: get-user
              method: GET
              description: "Get user details."
              inputParameters:
                - name: userKey
                  in: path
                  type: string
                  required: true
                  description: "User email or ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-user
              method: PUT
              description: "Update a user."
              inputParameters:
                - name: userKey
                  in: path
                  type: string
                  required: true
                  description: "User email or ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name:
                    givenName: "{{tools.givenName}}"
            - name: patch-user
              method: PATCH
              description: "Patch a user."
              inputParameters:
                - name: userKey
                  in: path
                  type: string
                  required: true
                  description: "User email or ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  suspended: "{{tools.suspended}}"
            - name: delete-user
              method: DELETE
              description: "Delete a user."
              inputParameters:
                - name: userKey
                  in: path
                  type: string
                  required: true
                  description: "User email or ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: user-admin
          path: /admin/directory/v1/users/{userKey}/makeAdmin
          description: "User admin operations."
          operations:
            - name: make-user-admin
              method: POST
              description: "Make a user an admin."
              inputParameters:
                - name: userKey
                  in: path
                  type: string
                  required: true
                  description: "User email or ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  status: "{{tools.status}}"
        - name: user-undelete
          path: /admin/directory/v1/users/{userKey}/undelete
          description: "User undelete."
          operations:
            - name: undelete-user
              method: POST
              description: "Undelete a user."
              inputParameters:
                - name: userKey
                  in: path
                  type: string
                  required: true
                  description: "User email or ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: user-signout
          path: /admin/directory/v1/users/{userKey}/signOut
          description: "User sign out."
          operations:
            - name: sign-out-user
              method: POST
              description: "Sign out a user from all sessions."
              inputParameters:
                - name: userKey
                  in: path
                  type: string
                  required: true
                  description: "User email or ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: groups
          path: /admin/directory/v1/groups
          description: "Group management."
          operations:
            - name: list-groups
              method: GET
              description: "List groups in the domain."
              inputParameters:
                - name: domain
                  in: query
                  type: string
                  required: false
                  description: "Domain name."
                - name: customer
                  in: query
                  type: string
                  required: false
                  description: "Customer ID."
                - name: maxResults
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results."
                - name: pageToken
                  in: query
                  type: string
                  required: false
                  description: "Page token."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-group
              method: POST
              description: "Create a new group."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  email: "{{tools.email}}"
                  name: "{{tools.name}}"
        - name: group-details
          path: /admin/directory/v1/groups/{groupKey}
          description: "Individual group management."
          operations:
            - name: get-group
              method: GET
              description: "Get group details."
              inputParameters:
                - name: groupKey
                  in: path
                  type: string
                  required: true
                  description: "Group email or ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-group
              method: PUT
              description: "Update a group."
              inputParameters:
                - name: groupKey
                  in: path
                  type: string
                  required: true
                  description: "Group email or ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: delete-group
              method: DELETE
              description: "Delete a group."
              inputParameters:
                - name: groupKey
                  in: path
                  type: string
                  required: true
                  description: "Group email or ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: org-units
          path: /admin/directory/v1/customer/{customerId}/orgunits
          description: "Organizational unit management."
          operations:
            - name: list-org-units
              method: GET
              description: "List organizational units."
              inputParameters:
                - name: customerId
                  in: path
                  type: string
                  required: true
                  description: "Customer ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-org-unit
              method: POST
              description: "Create an organizational unit."
              inputParameters:
                - name: customerId
                  in: path
                  type: string
                  required: true
                  description: "Customer ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  parentOrgUnitPath: "{{tools.parentOrgUnitPath}}"

  exposes:
    - type: rest
      port: 8100
      namespace: gws-admin-rest-api
      resources:
        - path: /v1/users
          name: users
          description: "User management."
          operations:
            - method: GET
              name: list-users
              description: "List users."
              call: "gws-admin.list-users"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: gws-admin-mcp
      transport: http
      tools:
        - name: list-users
          description: "List users in the Google Workspace domain."
          hints:
            readOnly: true
            openWorld: true
          call: "gws-admin.list-users"
          outputParameters:
            - type: object
              mapping: "$."
