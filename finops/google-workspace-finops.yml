description: 'FOCUS-aligned FinOps for Google Workspace: per-user-per-month seat subscription with
  pooled storage, billed monthly or annually. Workspace REST APIs are bundled with the seat license at
  no per-call charge; cost is therefore measured in seats and storage, not in API calls.'
sources:
  - https://workspace.google.com/pricing
  - https://support.google.com/a/answer/7232932
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Google Workspace
  ServiceCategory: Productivity / Collaboration SaaS
  ProviderName: Google
  PublisherName: Google LLC
  InvoiceIssuerName: Google LLC
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: workspace_seats
    description: Active Workspace seats by edition
    unit: seat
    aggregation: max
    dimensions:
      - edition
      - org_unit
      - billing_account
  - name: pooled_storage
    description: Pooled storage consumed across the domain
    unit: GB-month
    aggregation: avg
    dimensions:
      - org_unit
      - service
  - name: meet_recordings_storage
    description: Storage consumed by Meet recordings
    unit: GB-month
    aggregation: avg
  - name: vault_retention
    description: Vault retention storage for Business Plus / Enterprise
    unit: GB-month
    aggregation: avg
  - name: api_requests
    description: Workspace API call volume (operational metric — not directly billed)
    unit: request
    aggregation: sum
    dimensions:
      - api
      - org_unit
principles:
  - name: Visibility
    description: Use the Admin SDK Reports API (or BigQuery audit log export) and the Workspace
      Admin Console billing report to see seat counts, storage consumption, and API call patterns.
  - name: Allocation
    description: Place users in Organizational Units mapped to cost centers; assign editions per OU
      so seat charges roll up to the right business owner.
  - name: Optimization
    description: Right-size editions per OU (Business Standard for general staff, Plus for
      compliance-heavy roles); reclaim seats from inactive accounts; archive Vault data on retention
      policy; purge stale Drive shared drives.
  - name: Accountability
    description: Designate a Workspace billing owner per division; review monthly Admin Console
      reports for seat / storage growth vs. forecast and catch rogue automation hitting API quotas.
maintainers:
